{% extends 'base.html' %}
{% block title %} Blog de Noticias{% endblock %}
{% block content %}

<div class="columns">
  <div class="column is-offset-3 is-6">

    <a href="{{ url_for('add_post') }}" class="button is-success">
      Agregar Post
    </a>

    <br><br>

    {% for post in posts %}
      <div class="card">
        <div class="card-content">
          <div class="media">
            <div class="media-content">
              <p class="title is-4">{{ post.title }}</p>
              <p class="subtitle is-5">{{ post.category.name }}</p>
            </div>
          </div>

          <div class="content">
            {{ post.content }}
          </div>
        </div>
      </div>

      <br>
    {% endfor %}

  </div>
</div>

{% endblock %}
